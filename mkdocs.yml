site_name: 青少年CTF文库
site_url: https://docs.qsnctf.com
site_description: 适合你快速入门的CTF百科全书
theme:
  name: material
  language: zh # 中文模式
  logo: assets/logo.png
  favicon: assets/logo.png
  # 主题配色
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  # 字体配置        
  font:
    text: Noto Sans
    code: Source Code Pro
  # 图标
  icon:
    repo: simple/github
  features:
    - content.action.edit # 编辑按钮
    - content.action.view # 查看按钮
    - content.code.annotate # 代码注释
    - content.code.copy # 复制代码
    - content.tabs.link # 标签链接
    - content.tooltips  # 工具提示
    - navigation.indexes # 导航索引
    - navigation.instant # 即时加载
    - navigation.tabs # 导航标签
    - navigation.instant.prefetch # 预加载
    - navigation.instant.progress # 指示进度器
    - navigation.tracking # 锚点跟踪
    - navigation.path # 面包屑导航
    - navigation.top # 导航顶部
    - toc.follow # 目录跟随
    - search.suggest # 搜索建议
    - search.highlight # 搜索高亮
    - search.share # 搜索分享

    
# repo
repo_url: https://github.com/qsnctf/qsnctf.github.io
repo_name: qsnctf/qsnctf.github.io
edit_uri: edit/docs/docs/

# plugins
plugins:
  - search # 内置搜索
  - tags # 标签
  - markmap # 思维导图


docs_dir: docs
site_dir: site

extra:
  generator: false
  social:
    - icon: simple/qq
      link: https://qm.qq.com/q/Ibz8EXRckO
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/2066710972
    - icon: fontawesome/brands/github
      link: https://github.com/qsnctf    
    - icon: fontawesome/solid/paper-plane
      link: mailto:lqn@sierting.com

extra_javascript:
  - javascripts/extra.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/pangu@3.3.0/dist/browser/pangu.min.js
  - https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js




copyright: Copyright 青少年CTF &copy; 2026 版权所有

extra_css:
  - stylesheets/markmap.css
  - stylesheets/main.css
  
# markdown 拓展
markdown_extensions:
# 详细参考 https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/
  - abbr # 添加词汇表 https://squidfunk.github.io/mkdocs-material/reference/tooltips/#adding-a-glossary 添加缩写: https://squidfunk.github.io/mkdocs-material/reference/tooltips/#adding-abbreviations
  - admonition # 警告 https://squidfunk.github.io/mkdocs-material/reference/admonitions/#usage
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      #linenums: true # 显示行号
      #auto_title: true # 显示编程语言名称
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: none

